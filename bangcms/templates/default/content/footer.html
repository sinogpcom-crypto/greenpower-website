	<script type="text/javascript">

		function backToTop() {

			$('html,body').animate({scrollTop: 0}, 'fast');

		}

		$('#right_side').fix({

			float: 'right',

			minStatue: true,

			durationTime: 600

		});

	</script>

		<script>
		$('#myform2').submit(function(){
			var name2 = $('#name2');
			var company2 = $('#company2');
			var email2 = $('#email2');
			var phone2 = $('#phone2');
			var content2 = $('#content2');
			
			if(name2.val()==''){
				alert('Please enter your name');
				name2.focus();
				return false;
			}
			if(company2.val()==''){
				alert('Please enter your company name');
				company2.focus();
				return false;
			}
			if(phone2.val()==''){
				alert('Please enter your mobile/phone number');
				phone2.focus();
				return false;
			}
			if(email2.val()==''){
				alert('Please enter your email address');
				email2.focus();
				return false;
			}
			if(!check_email(email2.val())){
				alert('The email address entered is incorrect');
				email2.focus();
				return false;
			}
			if(content2.val()==''){
				alert('Please enter your message');
				content2.focus();
				return false;
			}

			
	        $.ajax({
	          url: "/index.php?m=formguide&c=index&a=show&formid=18&siteid=1&action=js&type=ajax",
	          dataType: "json",
	          type: "post",
	           data:{'info[tname]':name2.val(),
	                'info[qita]':company2.val(),
	                'info[phone]':phone2.val(),
	                'info[email]':email2.val(),
	                'info[content]':content2.val(),
	                'dosubmit':1,},
	          success: function(data) {
	            if (data) {
	              alert("Submit completed");
	              name2.val('');
	              company2.val('');
	              phone2.val('');
	              email2.val('');
	              content2.val('');
	              // $("button[type=reset]").trigger("click");
	            }
	          },
	          error:function () {
	           console.log(XMLHttpRequest.readyState + XMLHttpRequest.status + XMLHttpRequest.responseText);  
	          }
	        });
			return false;
		});
		
		//邮箱格式验证
		function check_email(str){
			var myreg = /^([a-zA-Z0-9]+[_|\_|\.]?)*[a-zA-Z0-9]+@([a-zA-Z0-9]+[_|\_|\.]?)*[a-zA-Z0-9]+\.[a-zA-Z]{2,3}$/;
			if(!myreg.test(str)){
				return false;
			}else{
				return true;
			}
		}
	</script>
